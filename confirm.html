<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando E-mail · MeuGramado</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .confirm-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--verde);
      color: var(--creme);
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .confirm-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 20%, rgba(196,146,42,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .confirm-card {
      background: var(--branco);
      color: var(--texto);
      padding: 48px 40px;
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease both;
    }
    .confirm-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      color: var(--verde);
      margin-bottom: 12px;
      line-height: 1.1;
    }
    .confirm-card p {
      font-size: 15px;
      color: var(--texto-soft);
      margin-bottom: 32px;
    }
    .spinner {
      margin: 0 auto 24px;
      width: 48px;
      height: 48px;
      border: 4px solid var(--verde-pale);
      border-top: 4px solid var(--dourado);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="confirm-page">
  <div class="confirm-card">
    <div class="spinner" id="confirm-spinner"></div>
    <h1 id="confirm-title">Confirmando seu E-mail</h1>
    <p id="confirm-message">Aguarde um momento enquanto validamos sua conta e preparamos tudo para você.</p>
    <a href="login.html" class="btn-primary" id="confirm-btn" style="display: none; width: 100%;">Ir para o Login</a>
  </div>
</div>

<script type="module">
  import { getSession } from './js/auth.js';

  async function init() {
    const titleEl = document.getElementById('confirm-title');
    const msgEl = document.getElementById('confirm-message');
    const spinnerEl = document.getElementById('confirm-spinner');
    const btnEl = document.getElementById('confirm-btn');

    // O Supabase mapeia os tokens (#access_token ou ?code) e autentica o browser automaticamente pela lib js.
    // Damos um pequeno delay para a UX ser suave e a lib do Supabase finalizar a leitura em background.
    setTimeout(async () => {
      const session = await getSession();
      spinnerEl.style.display = 'none';

      if (session) {
        titleEl.textContent = 'Conta Validada!';
        titleEl.style.color = 'var(--verde)';
        msgEl.textContent = 'Sua conta foi ativada com sucesso. Você será redirecionado em instantes para seu planejamento...';
        
        setTimeout(() => {
          window.location.replace('planner.html');
        }, 2000);
      } else {
        // Tratar erro retornado na URL se houver (ex link expirado)
        const params = new URLSearchParams(window.location.search);
        const errorDesc = params.get('error_description');

        titleEl.textContent = 'Ops, link inválido';
        titleEl.style.color = '#991b1b'; // Tom de erro
        msgEl.textContent = errorDesc 
          ? decodeURIComponent(errorDesc.replace(/\+/g, ' ')) 
          : 'O link de confirmação não é válido ou já expirou. Tente logar ou criar conta novamente.';
        
        btnEl.style.display = 'inline-flex';
      }
    }, 1500);
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
