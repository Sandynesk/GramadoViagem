<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Gramado & Canela Planner</title>
  <meta name="description" content="Faça login para acessar seu planejamento de viagem para Gramado e Canela.">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-page">
  <!-- Lang Toggle -->
  <div class="login-lang">
    <button class="btn-header" id="lang-toggle" data-i18n="lang.toggle">🇺🇸 EN</button>
  </div>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <h2 data-i18n="header.title">Gramado & <em>Canela</em></h2>
      <p id="login-subtitle" data-i18n="auth.welcomeSub">Faça login para salvar seu planejamento</p>
    </div>

    <!-- Error / Success Messages -->
    <div class="login-error" id="auth-error"></div>
    <div class="login-success" id="auth-success"></div>

    <!-- LOGIN FORM -->
    <form class="login-form" id="login-form">
      <div class="form-group" id="name-group" style="display: none;">
        <label for="auth-name" data-i18n="auth.name">Seu nome</label>
        <input type="text" id="auth-name" placeholder="Seu nome" data-i18n-placeholder="auth.name">
      </div>
      <div class="form-group">
        <label for="auth-email" data-i18n="auth.email">E-mail</label>
        <input type="email" id="auth-email" placeholder="seuemail@exemplo.com" required>
      </div>
      <div class="form-group">
        <label for="auth-password" data-i18n="auth.password">Senha</label>
        <input type="password" id="auth-password" placeholder="••••••" minlength="6" required>
      </div>
      <button type="submit" class="btn-primary" id="auth-submit" data-i18n="auth.login">Entrar</button>
    </form>

    <!-- Switch Login / Signup -->
    <div class="login-switch">
      <span id="switch-text" data-i18n="auth.noAccount">Não tem conta?</span>
      <a href="#" id="switch-link" data-i18n="auth.createHere">Crie aqui</a>
    </div>
  </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module">
  import { supabase } from './js/config.js';
  import { signIn, signUp } from './js/auth.js';
  import { redirectIfAuthenticated } from './js/router.js';
  import { t, toggleLanguage, applyTranslations } from './js/i18n.js';
  import { saveProfile } from './js/db.js';

  let isSignUp = false;

  async function init() {
    // Se já está logado, redirecionar
    await redirectIfAuthenticated();

    applyTranslations();

    // Lang toggle
    const langBtn = document.getElementById('lang-toggle');
    langBtn.addEventListener('click', () => {
      toggleLanguage();
      updateFormLabels();
    });

    // Switch login/signup
    document.getElementById('switch-link').addEventListener('click', (e) => {
      e.preventDefault();
      isSignUp = !isSignUp;
      updateFormLabels();
    });

    // Form submit
    document.getElementById('login-form').addEventListener('submit', handleSubmit);
  }

  function updateFormLabels() {
    const submitBtn = document.getElementById('auth-submit');
    const switchText = document.getElementById('switch-text');
    const switchLink = document.getElementById('switch-link');
    const nameGroup = document.getElementById('name-group');
    const subtitle = document.getElementById('login-subtitle');

    if (isSignUp) {
      submitBtn.textContent = t('auth.signup');
      switchText.textContent = t('auth.hasAccount');
      switchLink.textContent = t('auth.loginHere');
      nameGroup.style.display = 'flex';
      subtitle.textContent = t('auth.welcome');
    } else {
      submitBtn.textContent = t('auth.login');
      switchText.textContent = t('auth.noAccount');
      switchLink.textContent = t('auth.createHere');
      nameGroup.style.display = 'none';
      subtitle.textContent = t('auth.welcomeSub');
    }

    applyTranslations();
  }

  async function handleSubmit(e) {
    e.preventDefault();

    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const name = document.getElementById('auth-name').value.trim();
    const errorEl = document.getElementById('auth-error');
    const successEl = document.getElementById('auth-success');
    const submitBtn = document.getElementById('auth-submit');

    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if (!email) {
      errorEl.textContent = t('auth.error.email');
      errorEl.style.display = 'block';
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = t('auth.error.password');
      errorEl.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;

    try {
      if (isSignUp) {
        const data = await signUp(email, password, name);

        // Salvar perfil inicial
        if (data.user) {
          try {
            await saveProfile(data.user.id, { displayName: name, preferences: {} });
          } catch (profileErr) {
            console.warn('Erro ao salvar perfil:', profileErr);
          }
        }

        successEl.textContent = t('auth.success.signup');
        successEl.style.display = 'block';

        // Se o Supabase confirmar automaticamente (sem email confirm), redirecionar
        if (data.session) {
          setTimeout(() => {
            window.location.replace('index.html');
          }, 1000);
        }
      } else {
        await signIn(email, password);
        window.location.replace('index.html');
      }
    } catch (err) {
      console.error('Auth error:', err);
      errorEl.textContent = err.message || t('auth.error.generic');
      errorEl.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
